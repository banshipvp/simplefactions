name: SimpleFactions
version: 0.1.0
main: local.simplefactions.SimpleFactionsPlugin
api-version: "1.21"
softdepend: [WorldEdit, FastAsyncWorldEdit]
commands:
  f:
    description: Factions command
    usage: /f
  help:
    description: Show server plugin command help
    usage: /help [page]
    aliases: [shelp, serverhelp]
  hub:
    description: Teleport to the hub
    usage: /hub
    default: true
  sethub:
    description: Set the hub spawn point
    usage: /sethub
    permission: simplefactions.sethub
    default: op
  warzone:
    description: Manage warzone/safezone chunk claims
    usage: /warzone <claim|unclaim|autoclaim>
    permission: simplefactions.admin
    default: op
  showpos:
    description: Toggle auto-showing WorldEdit selection box
    usage: /showpos <on|off>
    permission: simplefactions.admin
    default: op
  rank:
    description: View or set a player's rank
    usage: /rank [set <player> <tier> | <player>]
    default: true
  rankinfo:
    description: View your own rank perks
    usage: /rankinfo
    default: true
  queue:
    description: Join the priority queue for the Factions server
    usage: /queue [join|leave|list|pos]
    default: true

permissions:
  simplefactions.sethub:
    description: Set the hub location
    default: op
  simplefactions.admin:
    description: Admin access to warzone management and other admin tools
    default: op
  simplefactions.rank:
    description: Set player ranks via /rank set
    default: op
